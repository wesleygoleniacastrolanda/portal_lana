<!doctype html>
<html lang="pt-BR">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Lana | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        :root {
            --castrolanda-blue: #004b87;
            --castrolanda-light-blue: #eef4fc;
            --castrolanda-gray: #f4f5f7;
            --text-dark: #333333;
            --border-soft: #d2deec;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 15% 10%, rgba(0, 75, 135, 0.12), transparent 35%),
                radial-gradient(circle at 90% 85%, rgba(0, 75, 135, 0.07), transparent 35%),
                var(--castrolanda-gray);
            color: var(--text-dark);
            display: grid;
            place-items: center;
            padding: 1rem;
        }

        .login-card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border: 1px solid var(--border-soft);
            border-top: 5px solid var(--castrolanda-blue);
            border-radius: 14px;
            box-shadow: 0 15px 35px rgba(0, 44, 91, 0.14);
            padding: 2rem;
        }

        .header-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .lana-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--castrolanda-blue);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 12px;
        }

        .main-title {
            color: var(--castrolanda-blue);
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0;
        }

        .sub-title {
            color: #6c757d;
            font-weight: 300;
            font-size: 1rem;
            margin: 0;
        }

        .form-label {
            color: var(--castrolanda-blue);
            font-weight: 600;
            margin-bottom: 0.35rem;
        }

        .form-control {
            border: 1px solid var(--border-soft);
            padding: 0.7rem 0.8rem;
            border-radius: 10px;
        }

        .form-control:focus {
            border-color: var(--castrolanda-blue);
            box-shadow: 0 0 0 0.25rem rgba(0, 75, 135, 0.25);
        }

        .btn-primary {
            background-color: var(--castrolanda-blue);
            border-color: var(--castrolanda-blue);
            font-weight: 700;
            border-radius: 10px;
            padding: 0.72rem 1rem;
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background-color: #003666;
            border-color: #003666;
        }

        .small-info {
            color: #6c757d;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="header-container">
            <img src="{% static 'lana_logo.png' %}" alt="Lana Logo" class="lana-logo">
            <h1 class="main-title h3">LANA</h1>
            <p class="sub-title">Acesse seu chat inteligente</p>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger" role="alert">
                Usuário ou senha inválidos. Tente novamente.
            </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}" novalidate>
            {% csrf_token %}

            <div class="mb-3">
                <label for="id_username" class="form-label">Usuário</label>
                <input type="text" name="username" id="id_username" class="form-control" autocomplete="username" required autofocus>
            </div>

            <div class="mb-3">
                <label for="id_password" class="form-label">Senha</label>
                <input type="password" name="password" id="id_password" class="form-control" autocomplete="current-password" required>
            </div>

            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>

        <p class="small-info">Portal Lana - Castrolanda</p>
    </main>
</body>
</html>
