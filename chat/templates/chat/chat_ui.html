<!doctype html>
<html lang="pt-BR">
<head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portal Lana | Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        html,
        body {
            height: 100%;
        }

        :root {
            --castrolanda-blue: #004b87;
            --castrolanda-light-blue: #eef4fc;
            --castrolanda-gray: #f4f5f7;
            --text-dark: #333333;
            --border-soft: #d2deec;
            --panel-shadow: 0 14px 35px rgba(0, 44, 91, 0.12);
        }

        body {
            min-height: 100%;
            margin: 0;
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            background-color: var(--castrolanda-gray);
            color: var(--text-dark);
        }

        .app-shell {
            height: 100vh;
            width: 100%;
            padding: 18px;
        }

        .chat-shell {
            height: 100%;
            padding: 0;
        }

        .chat-layout {
            height: 100%;
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            overflow: hidden;
            background: #ffffff;
            box-shadow: var(--panel-shadow);
            border-top: 5px solid var(--castrolanda-blue);
        }

        .chat-sidebar {
            background: #ffffff;
            color: var(--text-dark);
            height: 100%;
            border-right: 1px solid var(--border-soft);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .header-text {
            text-align: center;
        }

        .lana-logo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--castrolanda-blue);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .main-title {
            color: var(--castrolanda-blue);
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0;
            line-height: 1;
        }

        .sub-title {
            color: #6c757d;
            font-weight: 300;
            font-size: 0.78rem;
            line-height: 1.2;
            display: none;
        }

        .session-item {
            cursor: pointer;
            border: 1px solid #c7d7eb;
            background: #ffffff;
            color: var(--text-dark);
            transition: all 0.2s ease;
        }

        .session-item:hover,
        .session-item.active {
            border-color: var(--castrolanda-blue);
            background: var(--castrolanda-light-blue);
            transform: translateX(3px);
        }

        .chat-main {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        .chat-header {
            border-bottom: 1px solid var(--border-soft);
            background: var(--castrolanda-light-blue);
            padding-top: 0.9rem;
            padding-bottom: 0.9rem;
        }

        .messages-box {
            flex: 1;
            overflow-y: auto;
            padding: 1.4rem;
            background:
                linear-gradient(180deg, rgba(238, 244, 252, 0.45), rgba(244, 245, 247, 0.35));
        }

        .message-row {
            display: flex;
            margin-bottom: 0.9rem;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: min(760px, 88%);
            border-radius: 14px;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border-soft);
            white-space: pre-wrap;
            line-height: 1.55;
            animation: reveal 180ms ease;
            box-shadow: 0 3px 10px rgba(0, 75, 135, 0.05);
        }

        .message-time {
            font-size: 0.74rem;
            color: #6c757d;
            margin-top: 0.3rem;
            text-align: right;
            font-weight: 500;
        }

        .message-row.assistant .message-bubble {
            background: #ffffff;
        }

        .message-row.user .message-bubble {
            background: var(--castrolanda-light-blue);
            border-color: #b8d4f2;
        }

        .composer-box {
            border-top: 1px solid var(--border-soft);
            background: #fff;
            padding: 1rem;
        }

        .composer-textarea {
            resize: none;
            border: 1px solid var(--border-soft);
            min-height: 56px;
            max-height: 180px;
            border-radius: 12px;
            padding: 0.8rem 0.9rem;
        }

        .composer-textarea:focus,
        .form-select:focus {
            border-color: var(--castrolanda-blue);
            box-shadow: 0 0 0 0.25rem rgba(0, 75, 135, 0.25);
        }

        .btn-accent {
            background: var(--castrolanda-blue);
            border-color: var(--castrolanda-blue);
            color: white;
            font-weight: 700;
            border-radius: 10px;
        }

        .send-btn {
            min-height: 56px;
            align-self: flex-start;
            padding-left: 1.2rem;
            padding-right: 1.2rem;
        }

        .btn-accent:hover,
        .btn-accent:focus {
            background: #003666;
            border-color: #003666;
            color: white;
        }

        .typing {
            color: var(--castrolanda-blue);
            font-size: 0.9rem;
            padding-left: 0.3rem;
            min-height: 1.2rem;
        }

        .logout-btn {
            border-color: var(--castrolanda-blue);
            color: var(--castrolanda-blue);
        }

        .logout-btn:hover {
            background: var(--castrolanda-blue);
            color: #fff;
        }

        #emptyHint {
            margin-top: 10vh;
        }

        .sidebar-inner {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding-right: 0.2rem;
        }

        .sidebar-inner::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar-inner::-webkit-scrollbar-thumb {
            background: #c1d6ef;
            border-radius: 20px;
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 991px) {
            .app-shell {
                padding: 10px;
                height: 100dvh;
            }

            .chat-shell {
                height: auto;
            }

            .chat-layout {
                border-radius: 12px;
                min-height: calc(100dvh - 20px);
            }

            .sidebar-inner {
                max-height: 30vh;
                overflow-y: auto;
            }

            .messages-box {
                padding: 1rem;
            }

            .message-bubble {
                max-width: 96%;
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <div class="container-fluid chat-shell">
        <div class="row chat-layout g-0">
        <aside class="col-12 col-lg-3 chat-sidebar p-3">
            <div class="header-container">
                <img src="{% static 'lana_logo.png' %}" alt="Lana Logo" class="lana-logo">
                <div class="header-text">
                    <h2 class="main-title">LANA</h2>
                </div>
            </div>

            <div class="d-flex justify-content-end mb-3">
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm logout-btn">Sair</button>
                </form>
            </div>

            <label class="form-label small text-uppercase fw-semibold" style="color: var(--castrolanda-blue);">Escolha o agente</label>
            <select id="agentSelect" class="form-select form-select-sm mb-2"></select>

            <button id="newChatBtn" type="button" class="btn btn-accent w-100 mb-3">+ Novo chat</button>

            <div class="sidebar-inner">
                <p class="small text-uppercase fw-semibold mb-2" style="color: var(--castrolanda-blue);">Conversas recentes</p>
                <div id="sessionsList" class="d-grid gap-2"></div>
            </div>
        </aside>

        <section class="col-12 col-lg-9 chat-main">
            <header class="chat-header px-3 py-2 d-flex justify-content-between align-items-center">
                <div>
                    <strong id="chatTitle">Selecione um agente</strong>
                    <div class="small text-secondary" id="chatMeta">Pronto para iniciar</div>
                </div>
                <span class="badge text-bg-light border" id="sessionBadge">Sem sessão</span>
            </header>

            <main id="messagesBox" class="messages-box">
                <div class="text-center text-secondary mt-4" id="emptyHint">Escolha um agente e envie uma mensagem para começar.</div>
            </main>

            <footer class="composer-box">
                <form id="chatForm" class="d-flex gap-2 align-items-start">
                    <div class="flex-grow-1">
                        <textarea id="messageInput" class="form-control composer-textarea" placeholder="Digite sua pergunta..." required></textarea>
                        <div class="typing" id="typingStatus"></div>
                    </div>
                    <button id="sendBtn" type="submit" class="btn btn-accent send-btn">Enviar</button>
                </form>
            </footer>
        </section>
        </div>
    </div>
</div>

<script>
    const apiBase = '/chat/api';

    const agentSelect = document.getElementById('agentSelect');
    const sessionsList = document.getElementById('sessionsList');
    const messagesBox = document.getElementById('messagesBox');
    const emptyHint = document.getElementById('emptyHint');
    const chatTitle = document.getElementById('chatTitle');
    const chatMeta = document.getElementById('chatMeta');
    const sessionBadge = document.getElementById('sessionBadge');
    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingStatus = document.getElementById('typingStatus');
    const newChatBtn = document.getElementById('newChatBtn');

    let selectedAgentId = null;
    let currentSessionId = null;
    let sessionsCache = [];

    function formatDate(isoDate) {
        if (!isoDate) {
            return '-';
        }
        return new Intl.DateTimeFormat('pt-BR', {
            day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
        }).format(new Date(isoDate));
    }

    function formatDateTime(isoDate) {
        if (!isoDate) {
            return '';
        }

        return new Intl.DateTimeFormat('pt-BR', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        }).format(new Date(isoDate));
    }

    function scrollToBottom() {
        messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.innerText = text;
        return div.innerHTML;
    }

    function renderMessage(role, content, createdAt = null) {
        emptyHint.style.display = 'none';
        const row = document.createElement('div');
        row.className = `message-row ${role}`;

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        const safeContent = escapeHtml(content);
        const timestamp = role === 'assistant' && createdAt
            ? `<div class="message-time">${formatDateTime(createdAt)}</div>`
            : '';

        bubble.innerHTML = `${safeContent}${timestamp}`;

        row.appendChild(bubble);
        messagesBox.appendChild(row);
        scrollToBottom();
    }

    function clearMessages() {
        messagesBox.innerHTML = '';
        emptyHint.style.display = 'block';
        messagesBox.appendChild(emptyHint);
    }

    async function fetchJson(url, options = {}) {
        const response = await fetch(url, options);
        const data = await response.json();

        if (!response.ok || data.status === 'error') {
            const message = data.message || 'Erro inesperado na API.';
            throw new Error(message);
        }

        return data;
    }

    function renderSessions(sessions) {
        sessionsList.innerHTML = '';
        sessionsCache = sessions;

        if (!sessions.length) {
            sessionsList.innerHTML = '<div class="small text-light-emphasis">Nenhuma conversa ainda.</div>';
            return;
        }

        sessions.forEach((session) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = `btn session-item text-start ${currentSessionId === session.id ? 'active' : ''}`;
            button.innerHTML = `<strong class="d-block">Chat ${session.id.slice(0, 8)}</strong><small>${formatDate(session.created_at)}</small>`;
            button.addEventListener('click', () => selectSession(session.id));
            sessionsList.appendChild(button);
        });
    }

    async function loadAgents() {
        const data = await fetchJson(`${apiBase}/agents/`);
        agentSelect.innerHTML = '';

        if (!data.agents.length) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = 'Nenhum agente ativo';
            agentSelect.appendChild(option);
            sendBtn.disabled = true;
            return;
        }

        data.agents.forEach((agent, index) => {
            const option = document.createElement('option');
            option.value = agent.id;
            option.textContent = agent.name;
            if (index === 0) {
                option.selected = true;
                selectedAgentId = agent.id;
                chatTitle.textContent = agent.name;
            }
            agentSelect.appendChild(option);
        });

        await loadSessions();
    }

    async function loadSessions() {
        if (!selectedAgentId) {
            return;
        }

        const data = await fetchJson(`${apiBase}/sessions/?agent_id=${encodeURIComponent(selectedAgentId)}`);
        renderSessions(data.sessions);

        if (currentSessionId) {
            const exists = data.sessions.some((session) => session.id === currentSessionId);
            if (!exists) {
                currentSessionId = null;
                sessionBadge.textContent = 'Sem sessão';
                clearMessages();
            }
        }
    }

    async function selectSession(sessionId) {
        currentSessionId = sessionId;
        sessionBadge.textContent = `Sessão ${sessionId.slice(0, 8)}`;

        const data = await fetchJson(`${apiBase}/messages/?session_id=${encodeURIComponent(sessionId)}`);
        clearMessages();
        chatTitle.textContent = data.session.agent_name;
        chatMeta.textContent = `Histórico carregado • ${data.messages.length} mensagem(ns)`;

        data.messages.forEach((msg) => renderMessage(msg.role, msg.content, msg.created_at));
        renderSessions(sessionsCache);
    }

    function startNewChat() {
        currentSessionId = null;
        sessionBadge.textContent = 'Sem sessão';
        clearMessages();
        chatMeta.textContent = 'Novo chat iniciado';
        renderSessions(sessionsCache);
        messageInput.focus();
    }

    async function sendMessage(event) {
        event.preventDefault();

        const content = messageInput.value.trim();
        if (!content || !selectedAgentId) {
            return;
        }

        renderMessage('user', content, new Date().toISOString());
        messageInput.value = '';
        messageInput.style.height = '56px';

        sendBtn.disabled = true;
        typingStatus.textContent = 'Lana está respondendo...';

        try {
            const data = await fetchJson(`${apiBase}/send-message/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    agent_id: selectedAgentId,
                    message: content,
                    session_id: currentSessionId
                })
            });

            currentSessionId = data.session_id;
            sessionBadge.textContent = `Sessão ${currentSessionId.slice(0, 8)}`;
            renderMessage('assistant', data.response, data.response_created_at);
            chatMeta.textContent = 'Conversa ativa';
            await loadSessions();
        } catch (error) {
            renderMessage('assistant', `Erro: ${error.message}`, new Date().toISOString());
        } finally {
            sendBtn.disabled = false;
            typingStatus.textContent = '';
            messageInput.focus();
        }
    }

    agentSelect.addEventListener('change', async (event) => {
        selectedAgentId = event.target.value;
        currentSessionId = null;
        const selectedAgentName = event.target.options[event.target.selectedIndex]?.textContent || 'Agente';
        chatTitle.textContent = selectedAgentName;
        chatMeta.textContent = 'Agente alterado';
        sessionBadge.textContent = 'Sem sessão';
        clearMessages();
        await loadSessions();
    });

    messageInput.addEventListener('input', () => {
        messageInput.style.height = '56px';
        messageInput.style.height = `${Math.min(messageInput.scrollHeight, 180)}px`;
    });

    newChatBtn.addEventListener('click', startNewChat);
    chatForm.addEventListener('submit', sendMessage);

    loadAgents().catch((error) => {
        chatMeta.textContent = `Erro: ${error.message}`;
        sessionsList.innerHTML = '<div class="small text-warning">Falha ao carregar dados do chat.</div>';
        sendBtn.disabled = true;
    });
</script>
</body>
</html>
